<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline · Journal</title>
    <style>
      :root { color-scheme: light; }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #faf5ff;
        color: #2e1065;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        padding: 24px;
      }
      .card {
        max-width: 22rem;
        text-align: center;
        background: #fff;
        border: 1px solid #ddd6fe;
        border-radius: 1rem;
        padding: 2rem;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
      }
      h1 { font-size: 1.25rem; margin: 0 0 0.5rem; }
      p { color: #6d28d9; opacity: 0.8; margin: 0 0 1.25rem; font-size: 0.95rem; }
      button {
        border: 0;
        border-radius: 9999px;
        background: #6d28d9;
        color: #fff;
        padding: 0.65rem 1.5rem;
        font-weight: 600;
        font-size: 0.95rem;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You&rsquo;re offline</h1>
      <p>This page needs a connection. Reconnect and try again — your saved practices are safe.</p>
      <button onclick="location.reload()">Retry</button>
    </div>
  </body>
</html>
